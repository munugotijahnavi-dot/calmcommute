<!DOCTYPE html>
<html>

<head>

<title>CalmCommute</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
    
<body>
<!-- CalmCommute Website -->
    <header class="top-header">
        <div class="logo">🚌 Calm Commute 🚆</div>
        <nav class="top-nav">
            <button onclick="showSection('home')">🏠 Home</button>
            <button onclick="showSection('route')">🗺️ Route Planner</button>
            <button onclick="showSection('relax')">🧘 Relax</button>
            <button onclick="showSection('feedback')">📝 Feedback</button>
        </nav>
        <div class="user-menu">
            <div class="hamburger" onclick="toggleMenu()">
                <div class="line"></div>
                <div class="line"></div>
                <div class="line"></div>
            </div>
            <div class="dropdown hide" id="profile-menu">
                <p id="user-details">Guest</p>
                <button onclick="logout()">Logout</button>
            </div>
        </div>
    </header>

<!-- DASHBOARD -->

<section id="home">

<div class="card floating">

<h3>Next Bus</h3>

<p>Arrival: 12 mins</p>
<p>Crowd Level: Medium</p>

</div>

<h2>Live Location</h2>

<div id="map"></div>

</section>

<!-- ROUTE PLANNER -->

<section id="route" class="hide">

<h2>Route Planner</h2>

<input id="place" placeholder="Search destination">

<button onclick="searchRoute()">Search</button>

<div id="routeResult"></div>

</section>

<!-- RELAX PAGE -->

<section id="relax" class="hide">

<h2>Relax Zone</h2>

<audio controls>

<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">

</audio>

<h3>Quick Exercises</h3>

<ul>

<li>Deep breathing</li>
<li>Neck stretch</li>
<li>Shoulder roll</li>

</ul>

</section>

<!-- FEEDBACK -->

<section id="feedback" class="hide">

<h2>Feedback</h2>

<input id="name" placeholder="Name">

<textarea id="message" placeholder="Feedback"></textarea>

<button onclick="sendFeedback()">Submit</button>

<p id="fbmsg"></p>

</section>

<script src="script.js"></script>

</body>

</html>
